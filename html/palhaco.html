<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Palhaço</title>
    <meta name="description" content="Video - A-Frame">
    <script src="../js/dist.js"></script>
    <script src="../js/play-on-click.js"></script>
    <script src="../js/hide-on-play.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <video id="palhaco" preload="auto"
               src="../Videos/O Palhaço (2011) Trailer Oficial-[onlinevideoconverter.com].mp4"
               width="160" height="90" autoplay loop="true"
               crossOrigin="anonymous"></video>
      </a-assets>

      <a-entity material="shader: flat; src: #palhaco"
                geometry="primitive: plane; width: 160; height: 84"
                position="0 0 -46.4"
                rotation="0 0 0"
                play-on-click
                visible="false">
      </a-entity>
      <a-camera>
        <a-entity
          position="0 0 -1.5"
          text="align: center;
                width: 6;
                wrapCount: 100;
                color: black;
                value: Clique ou toque para iniciar o video!"
          hide-on-play="#palhaco">
        </a-entity>
      </a-camera>
    </a-scene>
  </body>
</html
